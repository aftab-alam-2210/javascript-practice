<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Add User</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-black min-h-screen p-6">

  <div class="flex flex-col lg:flex-row gap-10">

    <!-- Form -->
    <div class="w-full max-w-xl mx-auto bg-zinc-900 border border-zinc-700 rounded-2xl p-8">

      <h1 class="text-4xl font-bold text-white text-center mb-8">
        Add User
      </h1>

      <form class="space-y-6">

        <div>
          <label class="block text-gray-300 mb-2">
            Name
          </label>

          
          <input
            id="name"
            type="text"
            class="w-full bg-zinc-800 border border-zinc-700 rounded-lg px-4 py-3 text-white outline-none"
          >
        </div>

        <div>
          <label class="block text-gray-300 mb-2">
            Role
          </label>
          <input
            id="role"
            type="text"
            class="w-full bg-zinc-800 border border-zinc-700 rounded-lg px-4 py-3 text-white outline-none"
          >
        </div>

        <div>
          <label class="block text-gray-300 mb-2">
            Bio
          </label>

          
          <textarea
            id="bio"
            rows="4"
            class="w-full bg-zinc-800 border border-zinc-700 rounded-lg px-4 py-3 text-white outline-none resize-none"
          ></textarea>
        </div>

        <div>
          <label class="block text-gray-300 mb-2">
            Photo URL
          </label>

         
          <input
            id="photo"
            type="text"
            class="w-full bg-zinc-800 border border-zinc-700 rounded-lg px-4 py-3 text-white outline-none"
          >
        </div>

        <button
          type="submit"
          class="w-full border border-zinc-700 text-white py-3 rounded-lg font-semibold"
        >
          Submit
        </button>

      </form>
    </div>

    <div class="users flex flex-wrap gap-6"></div>

  </div>

  <script src="script.js"></script>

</body>
</html>
