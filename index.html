<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Simple Download UI</title>

<style>
body {
    margin: 0;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg, #050d15, #232f30);
}

/* Glass Card */
.card {
    padding: 25px;
    border-radius: 15px;
    background: rgba(255,255,255,0.1);
    backdrop-filter: blur(10px);
    color: white;
    text-align: center;
    width: 250px;
}

/* Yeh hai wo white line track */
.line {
    width: 160px;
    height: 8px;
    background: rgba(253, 251, 251, 0.984);
    border-radius: 50px;
    margin: 10px auto;
    position: relative;
}

/* Yeh fill hota hua part hai */
.fill {
    width: 0%;
    height: 100%;
    background: rgb(205, 65, 65);
    border-radius: 50px;
}
/* Button */
button {
    margin-top: 10px;
    padding: 10px 20px;
    border: none;
    border-radius: 10px;
    background: rgb(65, 58, 193);
    color: white;
    cursor: pointer;
}
    /* .progress-container {
    width: 200px;
    height: 10px;
    background: rgb(245, 241, 241);   /* force visible */
    margin: 20px auto;
} */

.progress-bar {
    width: 50%;        /* force visible */
    height: 100%;
    background: yellow;
}
</style>

</head>
<body>

<div class="card">
    <div class="progress-container">
    <div class="progress-bar"></div>
    <div class="line">
        <div class="fill"></div>
    </div>
</div>

<p id="percentText">0%</p>
    <h2>Download</h2>
    <button id="startBtn">Start</button>
</div>
<script src="script.js" defer></script>
</body>
</html>
